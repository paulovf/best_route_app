name: CI - Verify Version Bump

on:
  pull_request:
    branches:
      - main

jobs:
  check-version:
    name: Verify package.json Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Get PR Version
        id: pr_version
        run: |
          PR_VER=$(jq -r '.version' package.json)
          echo "PR_VERSION=$PR_VER" >> $GITHUB_ENV
          echo "Proposed version in PR: $PR_VER"

      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Get Main Version
        id: main_version
        run: |
          MAIN_VER=$(jq -r '.version' main-branch/package.json)
          echo "MAIN_VERSION=$MAIN_VER" >> $GITHUB_ENV
          echo "Current version in main: $MAIN_VER"

      - name: Compare Versions
        run: |
          python3 -c "
          import sys
          
          def parse_version(v_str):
              base_version = v_str.split('-')[0]
              return tuple(map(int, base_version.split('.')))
          
          try:
              pr_v = parse_version('${{ env.PR_VERSION }}')
              main_v = parse_version('${{ env.MAIN_VERSION }}')
              
              print(f'Comparing PR Version: {pr_v} with Main Version: {main_v}')
              
              if pr_v <= main_v:
                  print('ERROR: The frontend application version must be incremented before merging into main!')
                  sys.exit(1)
              else:
                  print('SUCCESS: Frontend version has been successfully incremented!')
          except Exception as e:
              print(f'ERROR: Could not parse versions. Make sure they follow the X.Y.Z format. Details: {e}')
              sys.exit(1)
          "
