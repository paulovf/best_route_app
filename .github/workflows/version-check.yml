name: CI - Verify Frontend Bump

on:
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  check-version:
    name: Verify package.json Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Get PR Version
        id: pr_version
        run: |
          if [ ! -f package.json ]; then
            echo "ERROR: package.json not found in PR branch!"
            exit 1
          fi
          PR_VER=$(jq -r '.version' package.json)
          echo "PR_VERSION=$PR_VER" >> $GITHUB_ENV
          echo "Proposed version in PR: $PR_VER"

      - name: Checkout Base Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-branch

      - name: Get Base Version
        id: base_version
        run: |
          if [ ! -f base-branch/package.json ]; then
            echo "A branch base ainda não possui um package.json. Assumindo 0.0.0 para comparação."
            MAIN_VER="0.0.0"
          else
            MAIN_VER=$(jq -r '.version' base-branch/package.json)
          fi
          echo "MAIN_VERSION=$MAIN_VER" >> $GITHUB_ENV
          echo "Current version in base branch: $MAIN_VER"

      - name: Compare Versions
        run: |
          python3 -c "
          import sys

          def parse_version(v_str):
              base_version = v_str.split('-')[0]
              return tuple(map(int, base_version.split('.')))

          try:
              pr_v = parse_version('${{ env.PR_VERSION }}')
              main_v = parse_version('${{ env.MAIN_VERSION }}')
              
              print(f'Comparing PR Version: {pr_v} with Base Version: {main_v}')
              
              if pr_v <= main_v:
                  print('ERROR: The frontend application version must be incremented before merging!')
                  sys.exit(1)
              else:
                  print('SUCCESS: Frontend version has been successfully incremented!')
          except Exception as e:
              print(f'ERROR: Could not parse versions. Details: {e}')
              sys.exit(1)
          "
