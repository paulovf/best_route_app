name: Playwright Tests
on:
  push:
    branches: [main, master, qa]
  pull_request:
    branches: [main, master, qa]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Create .env.local for CI
        run: |
          touch .env.local
          echo "API_URL=https://api.backend.mock" >> .env.local
          echo "X_API_KEY=ci-secret-key" >> .env.local

      - name: Code checkout
        uses: actions/checkout@v4

      - name: Up Web application (Docker)
        run: docker compose up -d web

      - name: Run Playwright tests
        run: |
          docker compose run test sh -c "npm install && npx playwright test --config playwright.config.ts"

      - name: Save Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
