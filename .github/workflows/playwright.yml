name: Playwright Tests

on:
  push:
    branches: [main, master, qa]
  pull_request:
    branches: [main, master, qa]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Create .env.local for CI
        run: |
          touch .env.local
          echo "API_URL=https://api.backend.mock" >> .env.local
          echo "X_API_KEY=ci-secret-key" >> .env.local

      - name: Create Docker Network
        run: docker network create bestroute-shared-network

      - name: Build and start Docker containers
        run: docker compose build web test

      - name: Up Web application
        run: docker compose up -d web

      - name: Wait for web service to be ready
        run: |
          echo "Esperando o serviço web iniciar..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Web service está online!"
              break
            fi
            echo "Aguardando... $i"
            sleep 3
          done

      - name: Run Playwright tests
        run: docker compose run --rm test npx playwright test

      - name: Save Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
