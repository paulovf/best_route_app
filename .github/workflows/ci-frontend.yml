name: Next.js CI - Code Quality & Test

on:
  push:
    branches: ["main", "master", "develop", "qa"]
  pull_request:
    branches: ["main", "master", "develop", "qa"]

jobs:
  validate:
    name: Lint, Typecheck and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          
      - name: Remove existing SWC cache
        run: rm -rf /home/runner/.cache/next-swc

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting & Linting
        run: npm run lint

      - name: Check TypeScript Compilation
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm test -- --passWithNoTests

      - name: Verify Next.js Production Build
        run: npm run build
